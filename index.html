<html lang="zh-CN">
<head>
    <meta charset="UTF-8">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #fff5e6 0%, #ffe8cc 50%, #ffd699 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            overflow-x: hidden;
        }

        .container {
            width: 100%;
            max-width: 600px;
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
            animation: fadeInDown 0.8s ease-out;
        }

        .header h1 {
            font-size: 2.5em;
            color: #d4623f;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.1);
            letter-spacing: 2px;
        }

        .header p {
            font-size: 1.1em;
            color: #8b5a3c;
            opacity: 0.9;
        }

        .divider {
            height: 2px;
            background: linear-gradient(90deg, transparent, #d4623f, transparent);
            margin: 20px 0;
            opacity: 0.5;
        }

        /* 转盘容器 */
        .wheel-container {
            position: relative;
            display: flex;
            justify-content: center;
            margin-bottom: 40px;
            perspective: 1000px;
        }

        .wheel {
            width: 280px;
            height: 280px;
            background: conic-gradient(
                from 0deg,
                #ff6b6b, #ff8787, #ffa5a5, #ffadad, #ff8c8c,
                #ffb347, #ffcc99, #ffe5b4, #ffd699, #ffb366,
                #95e1d3, #a8f5d9, #b8f8e3, #c4ffee, #d1fff5,
                #74b9ff, #a0d7ff, #c1e9ff, #dff5ff, #b3d9ff
            );
            border-radius: 50%;
            box-shadow: 0 10px 40px rgba(212, 98, 63, 0.3),
                        0 0 0 8px rgba(255, 255, 255, 0.8),
                        inset 0 0 30px rgba(255, 255, 255, 0.4);
            cursor: pointer;
            transition: transform 0.3s ease;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 80px;
            font-weight: bold;
            user-select: none;
        }

        .wheel:hover {
            transform: scale(1.05) rotateZ(5deg);
        }

        .wheel.spinning {
            animation: spin 1.5s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }

        @keyframes spin {
            0% { transform: rotateZ(0deg); }
            100% { transform: rotateZ(720deg); }
        }

        .pointer {
            position: absolute;
            top: -15px;
            width: 0;
            height: 0;
            border-left: 10px solid transparent;
            border-right: 10px solid transparent;
            border-top: 20px solid #d4623f;
            z-index: 10;
            filter: drop-shadow(0 2px 4px rgba(0, 0, 0, 0.2));
        }

        /* 结果卡片 */
        .result-card {
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 15px 40px rgba(212, 98, 63, 0.2);
            text-align: center;
            opacity: 0;
            max-height: 0;
            overflow: hidden;
            transition: all 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .result-card.show {
            opacity: 1;
            max-height: 800px;
        }

        .dish-emoji {
            font-size: 5em;
            margin-bottom: 20px;
            animation: bounce 0.6s ease-out;
        }

        @keyframes bounce {
            0% {
                transform: scale(0) rotateZ(-45deg);
                opacity: 0;
            }
            50% {
                transform: scale(1.2);
            }
            100% {
                transform: scale(1) rotateZ(0);
            }
        }

        .dish-name {
            font-size: 2.2em;
            color: #d4623f;
            margin-bottom: 20px;
            font-weight: bold;
            letter-spacing: 1px;
        }

        .fortune-section {
            background: linear-gradient(135deg, #fef5e7 0%, #fdebd0 100%);
            border-left: 4px solid #f39c12;
            padding: 20px;
            margin: 20px 0;
            border-radius: 10px;
            text-align: left;
        }

        .fortune-label {
            font-size: 0.9em;
            color: #d4623f;
            font-weight: bold;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .fortune-text {
            font-size: 1.1em;
            color: #8b5a3c;
            line-height: 1.8;
            font-style: italic;
        }

        .reason-label {
            font-size: 0.9em;
            color: #2874a6;
            font-weight: bold;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .reason-text {
            font-size: 1em;
            color: #34495e;
            line-height: 1.8;
        }

        .reason-section {
            background: linear-gradient(135deg, #ebf5fb 0%, #d6eaf8 100%);
            border-left: 4px solid #3498db;
            padding: 20px;
            margin: 20px 0;
            border-radius: 10px;
            text-align: left;
        }

        /* 按钮组 */
        .button-group {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-top: 30px;
        }

        button {
            padding: 14px 32px;
            font-size: 1em;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s ease;
            letter-spacing: 1px;
        }

        .btn-draw {
            background: linear-gradient(135deg, #d4623f 0%, #c24a2e 100%);
            color: white;
            padding: 16px 40px;
            font-size: 1.1em;
            box-shadow: 0 8px 20px rgba(212, 98, 63, 0.3);
            text-transform: uppercase;
        }

        .btn-draw:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 12px 28px rgba(212, 98, 63, 0.4);
        }

        .btn-draw:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .btn-again {
            background: linear-gradient(135deg, #f39c12 0%, #e67e22 100%);
            color: white;
        }

        .btn-again:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(243, 156, 18, 0.3);
        }

        .btn-share {
            background: linear-gradient(135deg, #3498db 0%, #2980b9 100%);
            color: white;
        }

        .btn-share:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(52, 152, 219, 0.3);
        }

        /* 装饰元素 */
        .decoration {
            position: fixed;
            font-size: 3em;
            opacity: 0.1;
            pointer-events: none;
            z-index: -1;
        }

        .deco1 { top: 10%; left: 5%; animation: float 8s ease-in-out infinite; }
        .deco2 { top: 30%; right: 8%; animation: float 10s ease-in-out infinite 1s; }
        .deco3 { bottom: 15%; left: 10%; animation: float 9s ease-in-out infinite 2s; }
        .deco4 { bottom: 25%; right: 10%; animation: float 7s ease-in-out infinite 0.5s; }

        @keyframes float {
            0%, 100% { transform: translateY(0px) rotateZ(0deg); }
            50% { transform: translateY(-30px) rotateZ(5deg); }
        }

        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .pulse-ring {
            position: absolute;
            border: 3px solid rgba(212, 98, 63, 0.5);
            border-radius: 50%;
            animation: expandRing 2s ease-out infinite;
        }

        @keyframes expandRing {
            from {
                width: 260px;
                height: 260px;
                opacity: 1;
            }
            to {
                width: 320px;
                height: 320px;
                opacity: 0;
            }
        }

        /* 烟火效果 */
        .confetti {
            position: fixed;
            pointer-events: none;
            animation: confetti-fall 3s linear forwards;
            z-index: 20;
        }

        @keyframes confetti-fall {
            to {
                transform: translateY(100vh) rotateZ(720deg);
                opacity: 0;
            }
        }

        /* 响应式 */
        @media (max-width: 600px) {
            .header h1 {
                font-size: 2em;
            }

            .wheel {
                width: 220px;
                height: 220px;
                font-size: 60px;
            }

            .result-card {
                padding: 30px 20px;
            }

            .dish-name {
                font-size: 1.8em;
            }

            .button-group {
                flex-direction: column;
            }

            button {
                width: 100%;
            }
        }

        /* 音频控制 */
        .audio-toggle {
            position: fixed;
            top: 20px;
            right: 20px;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: white;
            border: 2px solid #d4623f;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 1.5em;
            box-shadow: 0 4px 12px rgba(212, 98, 63, 0.2);
            transition: all 0.3s ease;
            z-index: 100;
        }

        .audio-toggle:hover {
            transform: scale(1.1);
        }

        .audio-toggle.muted {
            opacity: 0.6;
        }
    </style>
</head>

        // 音效
        class AudioManager {
            constructor() {
                this.isMuted = false;
                this.setupAudio();
            }

            setupAudio() {
                // 创建音频上下文
                const audioContext = new (window.AudioContext || window.webkitAudioContext)();
                this.audioContext = audioContext;
                this.toggle = document.getElementById('audioToggle');
                this.toggle.addEventListener('click', () => this.toggleMute());
            }

            playSound(type) {
                if (this.isMuted) return;

                const audioContext = this.audioContext;
                const now = audioContext.currentTime;

                switch(type) {
                    case 'spin':
                        // 转盘音效
                        for (let i = 0; i < 3; i++) {
                            const osc = audioContext.createOscillator();
                            const gain = audioContext.createGain();
                            osc.connect(gain);
                            gain.connect(audioContext.destination);
                            osc.frequency.setValueAtTime(400 + i * 100, now);
                            osc.frequency.exponentialRampToValueAtTime(200, now + 0.1);
                            gain.gain.setValueAtTime(0.2, now);
                            gain.gain.exponentialRampToValueAtTime(0.01, now + 0.1);
                            osc.start(now + i * 0.05);
                            osc.stop(now + 0.1 + i * 0.05);
                        }
                        break;
                    case 'reveal':
                        // 揭晓音效
                        const osc = audioContext.createOscillator();
                        const gain = audioContext.createGain();
                        osc.connect(gain);
                        gain.connect(audioContext.destination);
                        osc.frequency.setValueAtTime(800, now);
                        osc.frequency.exponentialRampToValueAtTime(1200, now + 0.3);
                        gain.gain.setValueAtTime(0.2, now);
                        gain.gain.exponentialRampToValueAtTime(0.01, now + 0.3);
                        osc.start(now);
                        osc.stop(now + 0.3);
                        break;
                }
            }

            toggleMute() {
                this.isMuted = !this.isMuted;
                this.toggle.classList.toggle('muted');
                this.toggle.textContent = this.isMuted ? '🔇' : '🔊';
            }
        }

        const audioManager = new AudioManager();

        // 烟火效果
        function createConfetti() {
            const emojis = ['🎉', '✨', '🌟', '⭐', '🎊', '🎈', '🍽️', '😋'];
            for (let i = 0; i < 20; i++) {
                const confetti = document.createElement('div');
                confetti.className = 'confetti';
                confetti.textContent = emojis[Math.floor(Math.random() * emojis.length)];
                confetti.style.left = Math.random() * 100 + '%';
                confetti.style.top = '-20px';
                confetti.style.fontSize = (Math.random() * 20 + 20) + 'px';
                confetti.style.animationDelay = Math.random() * 0.5 + 's';
                document.body.appendChild(confetti);
                setTimeout(() => confetti.remove(), 3500);
            }
        }

        // 抽签函数
        function drawFortune() {
            const wheel = document.getElementById('wheel');
            const resultCard = document.getElementById('resultCard');
            const drawBtn = document.getElementById('drawBtn');
            const initialButton = document.getElementById('initialButton');

            // 禁用按钮
            drawBtn.disabled = true;

            // 播放转盘音效
            audioManager.playSound('spin');

            // 转盘动画
            wheel.classList.add('spinning');

            // 随机延迟以增加悬念
            setTimeout(() => {
                const randomFood = foodDatabase[Math.floor(Math.random() * foodDatabase.length)];

                // 播放揭晓音效
                audioManager.playSound('reveal');

                // 更新卡片内容
                document.getElementById('dishEmoji').textContent = randomFood.emoji;
                document.getElementById('dishName').textContent = randomFood.name;
                document.getElementById('fortune').textContent = randomFood.fortune;
                document.getElementById('reason').textContent = randomFood.reason;

                // 显示结果卡片
                resultCard.classList.add('show');
                initialButton.style.display = 'none';

                // 生成烟火
                createConfetti();

                // 移除转盘动画类
                wheel.classList.remove('spinning');

                // 重新启用按钮
                drawBtn.disabled = false;
                drawBtn.style.display = 'none';
            }, 1500);
        }

        // 分享功能
        function shareResult() {
            const dishName = document.getElementById('dishName').textContent;
            const fortune = document.getElementById('fortune').textContent;
            const text = `🎯 我的明天美食命签：${dishName}\n\n✨ 食运签名\n${fortune}\n\n\n--- 用\"明天吃什么\" 命签给你的惊喜 ---`;

            if (navigator.share) {
                navigator.share({
                    title: '我的美食命签',
                    text: text
                });
            } else {
                // 复制到剪贴板
                navigator.clipboard.writeText(text).then(() => {
                    alert('已复制到剪贴板！分享给你的朋友吧 🍽️');
                });
            }
        }
